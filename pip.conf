[global]
# PyTorch CUDA builds are not on PyPI; they live on the PyTorch index.
# pip reads this file automatically when run from the project root, so
# `pip install -e .[ml]` resolves `torch` to the CUDA wheel without any
# extra --index-url flags.
#
# cu124 = CUDA 12.4 — last build that includes Pascal kernels (sm_61, GTX 10xx).
# Use cu128 here if you have an Ampere/Ada/Hopper GPU (RTX 30xx/40xx/H100).
extra-index-url = https://download.pytorch.org/whl/cu124
